[build]
  publish = "."
  command = "node scripts/gen-config.js"

# This is a static site (no build step required).
# Keeping it explicit avoids misconfigured publish directories that break fetch() for JSON files.
# We do generate config.js at build-time from environment variables (EmailJS).

[build.environment]
  # EmailJS values are safe to be public (client-side), but Netlify may still treat env var values as secrets.
  # This prevents the deploy from failing when config.js contains these values.
  SECRETS_SCAN_OMIT_KEYS = "EMAILJS_PUBLIC_KEY,EMAILJS_SERVICE_ID,EMAILJS_CONTACT_TEMPLATE_ID,EMAILJS_AUTOREPLY_TEMPLATE_ID"
  SECRETS_SCAN_OMIT_PATHS = "config.js"
